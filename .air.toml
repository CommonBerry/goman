root = "."
tmp_dir = "tmp"

[build]
  bin = "tmp/api"
  cmd = "go build -o ./tmp/api ./cmd/api"
  delay = 1000
  exclude_dir = ["bin", "tmp", "vendor"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = true
  follow_symlink = false
  full_bin = ""
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html"]
  kill_delay = "0s"
  log = "air-build.log"
  poll = true
  poll_interval = 500
  post_cmd = []
  pre_cmd = []
  rerun = false
  rerun_delay = 500

[color]
  app = "yellow"
  build = "green"
  main = "magenta"
  runner = "cyan"
  watcher = "white"

[log]
  time = false

[misc]
  clean_on_exit = true
