services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      DATABASE_URL: postgres://goman:goman@postgres:5432/goman?sslmode=disable
    volumes:
      - .:/app
      - /app/tmp
    depends_on:
      - postgres

  postgres:
    image: docker.io/library/postgres:17-alpine
    environment:
      POSTGRES_USER: goman
      POSTGRES_PASSWORD: goman
      POSTGRES_DB: goman
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "goman", "-d", "goman"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
